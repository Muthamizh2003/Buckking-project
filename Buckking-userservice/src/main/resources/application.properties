spring.application.name=Buckking-userservice

# MySQL Database
spring.datasource.url=jdbc:mysql://localhost:3306/buck_db
spring.datasource.username=root
spring.datasource.password=root1234

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8081

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Upload directory
app.upload.dir=uploads/avatars

# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.wipro.buck=DEBUG

# CORS - allow React dev server
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# GitHub OAuth2 (disabled by default - enable when you add your client-id/secret)
app.oauth2.enabled=true
